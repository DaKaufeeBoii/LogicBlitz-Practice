<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicBlitz ⚡</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="landing-container">
        <header class="hero">
            <h1 class="fade-in-down">LogicBlitz ⚡</h1>
            <p class="fade-in-up" style="animation-delay: 0.2s;">Select a discipline to begin the assessment.</p>
        </header>

        <section class="card-grid">
            <div class="quiz-card fade-in-up" data-subject="python" style="animation-delay: 0.4s;">
                <div class="card-icon">🐍</div>
                <h2>Python</h2>
                <p>Core syntax, data structures, and fundamental logic.</p>
                <button class="start-btn">Start Quiz</button>
            </div>

            <div class="quiz-card fade-in-up" data-subject="ml" style="animation-delay: 0.6s;">
                <div class="card-icon">🤖</div>
                <h2>Machine Learning</h2>
                <p>Algorithms, data preprocessing, and model evaluation.</p>
                <button class="start-btn">Start Quiz</button>
            </div>

    </main>

    <footer class="credits">
        By Sai Tarun Reddy Velagala
    </footer>

    <script src="script.js"></script>
</body>

</html>
